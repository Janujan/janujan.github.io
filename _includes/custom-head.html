<style>
  #bg-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    opacity: 0.18;
    pointer-events: none;
  }
</style>

<canvas id="bg-canvas"></canvas>

<script>
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  const BLUE = 'rgba(100, 180, 255, 1)';
  const GRID = 50;

  const planets = [
    { radius: 90,  size: 3, speed: 0.00025, angle: 0.5 },
    { radius: 150, size: 4, speed: 0.00015, angle: 2.1 },
    { radius: 220, size: 3, speed: 0.0001,  angle: 4.2 },
    { radius: 300, size: 5, speed: 0.00007, angle: 1.8 },
  ];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width  * 0.72;
    const cy = canvas.height * 0.48;

    // Blueprint grid
    ctx.lineWidth = 0.5;
    ctx.strokeStyle = 'rgba(100, 180, 255, 0.25)';
    for (let x = 0; x < canvas.width; x += GRID) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += GRID) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }

    // Crosshair at center
    ctx.strokeStyle = 'rgba(100, 180, 255, 0.5)';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(cx - 14, cy); ctx.lineTo(cx + 14, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy - 14); ctx.lineTo(cx, cy + 14); ctx.stroke();

    // Orbits
    ctx.lineWidth = 0.5;
    ctx.strokeStyle = 'rgba(100, 180, 255, 0.3)';
    planets.forEach(p => {
      ctx.beginPath();
      ctx.arc(cx, cy, p.radius, 0, Math.PI * 2);
      ctx.stroke();
    });

    // Sun
    ctx.beginPath();
    ctx.arc(cx, cy, 7, 0, Math.PI * 2);
    ctx.fillStyle = BLUE;
    ctx.fill();

    // Planets
    planets.forEach(p => {
      p.angle += p.speed;
      const x = cx + Math.cos(p.angle) * p.radius;
      const y = cy + Math.sin(p.angle) * p.radius;
      ctx.beginPath();
      ctx.arc(x, y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = BLUE;
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
</script>
